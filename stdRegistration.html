<html> <!-- opening tag -->

<head>
    <title>Vishwaniketan College</title>
</head>

<body>
    <h1>Student Registration Page</h1>
    <p>Fill in this form to get registered</p>
    <hr />

    <form>
        <label>Name</label>
        <input type="text" placeholder="Enter your name" />
        <br /> <!-- Line break -->
        <br />

        <label>Roll No.</label>
        <input type="text" placeholder="Enter your roll number" />
        <br />
        <br />

        <label>Date of Birth</label>
        <input type="date" placeholder="Enter your date of birth" />
        <br />
        <br />

        <label>Address</label>
        <textarea placeholder="Enter your address"></textarea>
        <br />
        <br />
        <label>Gender</label>
        <input type="radio" name="gender" value="male"/> Male
        <input type="radio" name="gender" value="female"/> Female
        <input type="radio" name="gender" value="others"/> Prefer Not To Say

        <br/>

        <label>Choose Subjects</label>
        <input type="checkbox" name="subject" value="C" /> C
        <input type="checkbox" name="subject" value="C++" /> C++
        <input type="checkbox" name="subject" value="Java" /> Java
        <input type="checkbox" name="subject" value="Python" /> Python

        <br />

        <button type="button">Submit</button>
    </form>
</body>

</html> <!-- closing tag -->
